<nav class="navbar" aria-label="Asosiy navigatsiya">
  <a class="brand" href="#home">
    <span class="brand-mark" aria-hidden="true">H</span>
    <span class="brand-text">Hamjihat</span>
  </a>

  <ul class="nav-list">
    @for (link of links; track link.href) {
      <li>
        <a [href]="link.href">{{ link.label }}</a>
      </li>
    }
  </ul>

  <div class="language-switcher">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      width="18"
      height="18"
      aria-hidden="true"
      focusable="false"
    >
      <path
        d="M12 2a10 10 0 1 0 10 10A10.012 10.012 0 0 0 12 2Zm6.92 9h-2.21a15.936 15.936 0 0 0-1.23-5A8.042 8.042 0 0 1 18.92 11ZM12 4.06A13.873 13.873 0 0 1 14.72 11H9.28A13.873 13.873 0 0 1 12 4.06ZM4.23 13h2.21a15.936 15.936 0 0 0 1.23 5A8.042 8.042 0 0 1 4.23 13Zm2.21-2H4.23a8.042 8.042 0 0 1 3.44-5 15.936 15.936 0 0 0-1.23 5Zm3.84 2h3.44A12.58 12.58 0 0 1 12 19.94 12.58 12.58 0 0 1 10.28 13Zm0-2A12.58 12.58 0 0 1 12 4.06 12.58 12.58 0 0 1 13.72 11Zm5.05 7a15.936 15.936 0 0 0 1.23-5h2.21a8.042 8.042 0 0 1-3.44 5Z"
      />
    </svg>

    <label class="sr-only" for="language-select">Tilni tanlang</label>
    <select
      id="language-select"
      [value]="selectedLanguage()"
      (change)="onLanguageChange($event)"
      aria-label="Tilni tanlang"
    >
      @for (language of languages; track language) {
        <option [value]="language">{{ language }}</option>
      }
    </select>
  </div>
</nav>
