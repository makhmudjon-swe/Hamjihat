<header class="hero" id="home">
  <div class="hero-copy">
    <div class="feature-pills" aria-label="Asosiy imkoniyatlar">
      @for (feature of features; track feature.label) {
        <span class="feature-pill">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <path [attr.d]="feature.iconPath" />
          </svg>
          <span>{{ feature.label }}</span>
        </span>
      }
    </div>

    <p class="eyebrow">Yangi avlod platformasi</p>
    <h1>Hududingizdagi o'zgarishlarni kuzating.</h1>
    <p class="lead">
      Davlat loyihalari va ajratilgan mablag'larning haqiqiy ijrosini fuqarolar bilan birga kuzatish
      platformasi.
    </p>

    <div class="actions">
      <a class="store-btn store-btn-primary" href="#" aria-label="Play Market orqali yuklab olish">
        <img
          src="/play-market.svg"
          width="24"
          height="24"
          alt="Play Market"
        />
        <span>Play Market</span>
      </a>
      <a class="store-btn store-btn-secondary" href="#" aria-label="App Store orqali yuklab olish">
        <img
          src="/app-store.svg"
          width="24"
          height="24"
          alt="App Store"
        />
        <span>App Store</span>
      </a>
    </div>
  </div>

  <div class="hero-visual" aria-hidden="true">
    <div class="hero-glow hero-glow-blue"></div>
    <div class="hero-glow hero-glow-orange"></div>
    <figure class="hero-phone-frame">
      <img
        src="/img1.png"
        alt="Hamjihat mobil ilovasi"
        class="hero-phone-image"
      />
    </figure>
  </div>
</header>
