<section class="page-section" id="directions" aria-labelledby="directions-title">
  <div class="section-head">
    <h2 id="directions-title">Yo'nalishlar</h2>
    <p>Asosiy yo'nalishlar bo'yicha loyihalarni ochiq kuzating.</p>
  </div>

  <div class="direction-grid">
    @for (item of directions; track item.title) {
      <article class="direction-card" [style.--accent-rgb]="item.accentRgb">
        <span class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28" focusable="false">
            <path [attr.d]="item.iconPath" />
          </svg>
        </span>
        <h3>{{ item.title }}</h3>
        <p>{{ item.description }}</p>
      </article>
    }
  </div>
</section>
