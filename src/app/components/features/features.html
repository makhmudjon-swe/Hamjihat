<section class="page-section" id="imkoniyatlar" aria-labelledby="imkoniyatlar-title">
  <div class="section-head">
    <h2 id="imkoniyatlar-title">Hamjihat nimalarni taklif qiladi?</h2>
    <p>
      Platforma orqali davlat loyihalarini kuzatish, baholash va muammolarni aniqlash har bir fuqaro
      uchun oson va ochiq.
    </p>
  </div>

  <div class="feature-grid" role="tablist" aria-label="Platforma imkoniyatlari">
    @for (feature of features; track feature.id) {
      <button
        type="button"
        role="tab"
        class="feature-card"
        [class.active]="activeFeatureId() === feature.id"
        [style.--accent-rgb]="feature.accentRgb"
        [attr.id]="'feature-tab-' + feature.id"
        [attr.aria-controls]="'feature-panel-' + feature.id"
        [attr.aria-selected]="activeFeatureId() === feature.id"
        (click)="selectFeature(feature.id)"
      >
        <span class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28" focusable="false">
            <path [attr.d]="feature.iconPath" />
          </svg>
        </span>
        <span class="card-title">{{ feature.title }}</span>
        <span class="card-description">{{ feature.description }}</span>
      </button>
    }
  </div>

  <article
    class="feature-detail"
    role="tabpanel"
    [style.--accent-rgb]="activeFeature().accentRgb"
    [attr.id]="'feature-panel-' + activeFeature().id"
    [attr.aria-labelledby]="'feature-tab-' + activeFeature().id"
  >
    <div class="detail-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="30" height="30" focusable="false">
        <path [attr.d]="activeFeature().iconPath" />
      </svg>
    </div>
    <div>
      <h3>{{ activeFeature().title }}</h3>
      <p>{{ activeFeature().description }}</p>
    </div>
  </article>
</section>
