<section class="problem-section" id="problem" aria-labelledby="problem-title">
  <div class="problem-head">
    <h2 id="problem-title">MUAMMO</h2>
    <p>Har bir korrupsiyaviy xatarlar zanjiridagi muhim bo'g'in.</p>
  </div>

  <div class="problem-grid">
    @for (item of problemItems; track item.id; let i = $index) {
      <button
        class="problem-card"
        type="button"
        [class.active]="activeIndex() === i"
        (click)="activeIndex.set(i)"
        [attr.aria-pressed]="activeIndex() === i"
      >
        <span class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28" focusable="false">
            <path [attr.d]="item.iconPath"></path>
          </svg>
        </span>
        <span class="problem-index">{{ item.id }}</span>
        <p>{{ item.text }}</p>
      </button>
    }
  </div>
</section>
