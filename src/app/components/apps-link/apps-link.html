<section class="final-cta" id="download-app" aria-labelledby="final-cta-title">
  <div class="cta-copy">
    <h2 id="final-cta-title">
      Loyiha nazoratini bugundan boshlang.
      <span>Muammolarni kechiktirmasdan yuboring.</span>
    </h2>

    <p>
      Hamjihat orqali hududingizdagi loyihalarni kuzating, muammolarni foto va tavsif bilan
      yuboring va bajarilish jarayonini ochiq nazorat qiling.
    </p>

    <div class="cta-actions" aria-label="Yuklab olish va tanishish havolalari">
      <a class="store-btn" href="#" aria-label="Play Market orqali yuklab olish">
        <img
          ngSrc="/play-market.svg"
          width="24"
          height="24"
          alt="Play Market"
        />
        <span>Play Market</span>
      </a>

      <a class="store-btn" href="#" aria-label="App Store orqali yuklab olish">
        <img
          ngSrc="/app-store.svg"
          width="24"
          height="24"
          alt="App Store"
        />
        <span>App Store</span>
      </a>

      <a class="store-btn" href="#" aria-label="Platforma videosini ko'rish">
        <img
          ngSrc="/play.svg"
          width="24"
          height="24"
          alt="Play"
        />
        <span>Videoni ko'rish</span>
      </a>
    </div>
  </div>

  <div class="cta-visual">
    <div class="orb orb-blue" aria-hidden="true"></div>
    <div class="orb orb-orange" aria-hidden="true"></div>
    <figure class="mockup-frame">
      <img
        ngSrc="/img3.png"
        width="320"
        height="680"
        alt="Hamjihat mobil ilovasi ko'rinishi"
        class="mockup-img"
      />
    </figure>
  </div>
</section>
